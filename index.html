<!DOCTYPE html>
<html lang="bn" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayFocus - Secure Video Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { cursor: pointer; width: 16px; height: 16px; border-radius: 50%; background: #10b981; }
        /* Hide controls transition */
        .controls-transition { transition: opacity 0.5s ease; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <div id="generator-view" class="w-full max-w-2xl mx-auto mt-10 p-8 bg-gray-800 rounded-2xl shadow-xl border border-gray-700 space-y-6">
        <h2 class="text-2xl font-bold text-center text-emerald-500">🎯 PlayFocus Generator</h2>
        
        <input type="text" id="yt-url" placeholder="YouTube, Shorts বা TikTok লিংক পেস্ট করুন..." class="w-full p-4 rounded-lg bg-gray-700 border border-gray-600 focus:border-emerald-500 outline-none">

        <div id="preview-section" class="hidden space-y-4 bg-gray-900 p-6 rounded-xl border border-gray-700">
            <p class="text-sm text-gray-400 text-center">ভিডিও প্রিভিউ</p>
            <div class="relative w-full aspect-video bg-black rounded-lg overflow-hidden shadow-inner">
                <div id="preview-player" class="w-full h-full"></div>
            </div>
            <div class="flex gap-4">
                <button id="btn-set-start" class="flex-1 bg-emerald-600 hover:bg-emerald-700 p-2 rounded text-sm font-bold cursor-pointer">শুরু সেট করুন 🕒</button>
                <button id="btn-set-end" class="flex-1 bg-red-600 hover:bg-red-700 p-2 rounded text-sm font-bold cursor-pointer">শেষ সেট করুন 🕒</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <input type="number" id="start-time" value="0" class="p-3 rounded bg-gray-700 border border-gray-600">
            <input type="number" id="end-time" value="60" class="p-3 rounded bg-gray-700 border border-gray-600">
        </div>

        <button id="btn-generate" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-900 font-bold p-4 rounded-lg cursor-pointer">লিংক তৈরি করুন</button>
        
        <div id="result-box" class="hidden p-4 bg-gray-900 rounded border border-emerald-500/30">
            <input type="text" id="generated-link" readonly class="w-full p-2 bg-transparent text-sm text-emerald-400">
            <button id="btn-copy" class="w-full mt-2 bg-gray-700 p-2 rounded text-sm font-bold cursor-pointer hover:bg-gray-600">Copy & Open</button>
        </div>
    </div>

    <div id="player-view" class="fixed inset-0 w-screen h-screen bg-black hidden z-50 flex flex-col">
        
        <button id="btn-fullscreen" class="absolute top-6 right-6 z-[60] bg-black/50 p-3 rounded-xl hover:bg-black/80">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
        </button>

        <div class="relative flex-grow flex items-center justify-center">
            <div id="video-overlay" class="video-overlay"></div>
            <div id="yt-player" class="w-full h-full"></div>
            <div id="tt-player-container" class="w-full h-full hidden"></div>
        </div>
        
        <div id="controls-bar" class="controls-transition absolute bottom-0 w-full bg-gradient-to-t from-black via-black/80 to-transparent p-6 space-y-4">
            <input type="range" id="progress-slider" min="0" max="100" value="0" class="w-full h-2 accent-emerald-500">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <button id="btn-play-pause" class="bg-emerald-500 px-6 py-2 rounded-lg font-bold cursor-pointer">Pause</button>
                    <button id="btn-mute" class="bg-gray-700 px-4 py-2 rounded-lg cursor-pointer">🔊</button>
                    <input type="range" id="volume-slider" min="0" max="100" value="100" class="w-24 accent-emerald-500 cursor-pointer">
                </div>
                <div id="time-display" class="font-mono text-sm">00:00 / 00:00</div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player, previewPlayer, videoId, startTime, endTime, updateInterval, controlsTimeout;
        let videoType = 'yt';

        // 1. URL Parser
        function parseVideoUrl(url) {
            const shortsMatch = url.match(/shorts\/([a-zA-Z0-9_-]+)/);
            if (shortsMatch) return { type: 'yt', id: shortsMatch[1] };
            const ytMatch = url.match(/(?:youtu\.be\/|watch\?v=|embed\/)([^#\&\?]*)/);
            if (ytMatch) return { type: 'yt', id: ytMatch[1] };
            const ttMatch = url.match(/\/video\/(\d+)/);
            if (ttMatch) return { type: 'tt', id: ttMatch[1] };
            return null;
        }

        // 2. Preview Player
        document.getElementById('yt-url').addEventListener('input', (e) => {
            const parsed = parseVideoUrl(e.target.value);
            if (parsed && parsed.type === 'yt') {
                document.getElementById('preview-section').classList.remove('hidden');
                if (!previewPlayer) {
                    previewPlayer = new YT.Player('preview-player', { videoId: parsed.id });
                } else {
                    previewPlayer.loadVideoById(parsed.id);
                }
            } else {
                document.getElementById('preview-section').classList.add('hidden');
            }
        });

        // Time Set Buttons
        document.getElementById('btn-set-start').addEventListener('click', () => {
            document.getElementById('start-time').value = Math.floor(previewPlayer.getCurrentTime());
        });
        document.getElementById('btn-set-end').addEventListener('click', () => {
            document.getElementById('end-time').value = Math.floor(previewPlayer.getCurrentTime());
        });

        // 3. Main Player
        function initMainPlayer() {
            player = new YT.Player('yt-player', {
                videoId: videoId,
                playerVars: { controls: 0, autoplay: 1, rel: 0, modestbranding: 1 },
                events: { 'onReady': (e) => {
                    e.target.seekTo(startTime);
                    updateInterval = setInterval(checkTime, 100);
                }}
            });
        }

        function checkTime() {
            const current = player.getCurrentTime();
            // Loop Functionality
            if (current >= endTime) {
                player.seekTo(startTime);
            }
            document.getElementById('progress-slider').value = current - startTime;
            document.getElementById('time-display').innerText = formatTime(current - startTime) + " / " + formatTime(endTime - startTime);
        }

        function formatTime(s) {
            const m = Math.floor(s/60); const sec = Math.floor(s%60);
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        // Volume
        document.getElementById('volume-slider').addEventListener('input', (e) => {
            player.setVolume(e.target.value);
            resetControlsTimeout();
        });

        // UI Helpers
        document.getElementById('btn-mute').addEventListener('click', () => {
            if (player.isMuted()) { player.unMute(); document.getElementById('btn-mute').innerText = "🔊"; }
            else { player.mute(); document.getElementById('btn-mute').innerText = "🔇"; }
        });

        document.getElementById('btn-play-pause').addEventListener('click', () => {
            const state = player.getPlayerState();
            if (state == 1) player.pauseVideo(); else player.playVideo();
        });

        // Hide Controls Logic
        document.addEventListener('mousemove', () => {
            const bar = document.getElementById('controls-bar');
            const fs = document.getElementById('btn-fullscreen');
            bar.style.opacity = '1';
            fs.style.opacity = '1';
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                bar.style.opacity = '0';
                fs.style.opacity = '0';
            }, 3000);
        });

        // Init
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('lesson')) {
            const data = JSON.parse(atob(urlParams.get('lesson')));
            videoId = data.v; startTime = parseInt(data.s); endTime = parseInt(data.e);
            document.getElementById('player-view').classList.remove('hidden');
            document.getElementById('generator-view').classList.add('hidden');
        }

        function onYouTubeIframeAPIReady() { if(videoId) initMainPlayer(); }
    </script>
</body>
</html>
