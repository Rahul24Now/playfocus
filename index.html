<!DOCTYPE html>
<html lang="bn" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayFocus - Secure Video Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans Bengali', sans-serif; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { cursor: pointer; width: 16px; height: 16px; border-radius: 50%; background: #10b981; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4">

    <div id="generator-view" class="w-full max-w-xl bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700 space-y-6">
        <h2 class="text-2xl font-bold text-center text-emerald-500">PlayFocus Generator</h2>
        
        <input type="text" id="yt-url" placeholder="YouTube, Shorts বা TikTok লিংক পেস্ট করুন..." class="w-full p-4 rounded-lg bg-gray-700 border border-gray-600 focus:border-emerald-500 outline-none">

        <div id="preview-section" class="hidden space-y-4 bg-gray-900 p-4 rounded-xl border border-gray-700">
            <div class="relative w-full aspect-video bg-black rounded-lg overflow-hidden">
                <div id="preview-player" class="w-full h-full"></div>
            </div>
            <div class="flex gap-4">
                <button id="btn-set-start" class="flex-1 bg-emerald-600 hover:bg-emerald-700 p-2 rounded text-sm font-bold">শুরু সেট করুন 🕒</button>
                <button id="btn-set-end" class="flex-1 bg-red-600 hover:bg-red-700 p-2 rounded text-sm font-bold">শেষ সেট করুন 🕒</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <input type="number" id="start-time" value="0" class="p-3 rounded bg-gray-700 border border-gray-600">
            <input type="number" id="end-time" value="60" class="p-3 rounded bg-gray-700 border border-gray-600">
        </div>

        <button id="btn-generate" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-900 font-bold p-4 rounded-lg">লিংক তৈরি করুন</button>
        
        <div id="result-box" class="hidden p-4 bg-gray-900 rounded border border-emerald-500/30">
            <input type="text" id="generated-link" readonly class="w-full p-2 bg-transparent text-xs text-emerald-400">
            <button id="btn-copy" class="w-full mt-2 bg-gray-700 p-2 rounded text-xs font-bold">Copy & Open</button>
        </div>
    </div>

    <div id="player-view" class="fixed inset-0 w-screen h-screen bg-black hidden z-50 flex flex-col">
        <div class="relative flex-grow">
            <div id="video-overlay" class="video-overlay"></div>
            <div id="yt-player" class="w-full h-full hidden"></div>
            <div id="tt-player-container" class="w-full h-full hidden"></div>
        </div>
        
        <div id="controls-bar" class="p-6 bg-black/80 space-y-4">
            <input type="range" id="progress-slider" min="0" max="100" value="0" class="w-full h-2 accent-emerald-500">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <button id="btn-play-pause" class="bg-emerald-500 px-6 py-2 rounded-lg font-bold">Pause</button>
                    <button id="btn-mute" class="bg-gray-700 px-4 py-2 rounded-lg">🔊</button>
                    <input type="range" id="volume-slider" min="0" max="100" value="100" class="w-24 accent-emerald-500">
                </div>
                <div id="time-display" class="font-mono">00:00 / 00:00</div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player, previewPlayer, videoId, startTime, endTime, updateInterval;
        let videoType = 'yt';

        // URL Parsing
        function parseVideoUrl(url) {
            const shortsMatch = url.match(/shorts\/([a-zA-Z0-9_-]+)/);
            if (shortsMatch) return { type: 'yt', id: shortsMatch[1] };
            const ytMatch = url.match(/(?:youtu\.be\/|watch\?v=|embed\/)([^#\&\?]*)/);
            if (ytMatch) return { type: 'yt', id: ytMatch[1] };
            const ttMatch = url.match(/\/video\/(\d+)/);
            if (ttMatch) return { type: 'tt', id: ttMatch[1] };
            return null;
        }

        // Preview Logic
        document.getElementById('yt-url').addEventListener('input', (e) => {
            const parsed = parseVideoUrl(e.target.value);
            if (parsed && parsed.type === 'yt') {
                document.getElementById('preview-section').classList.remove('hidden');
                if (!previewPlayer) {
                    previewPlayer = new YT.Player('preview-player', { videoId: parsed.id });
                } else {
                    previewPlayer.loadVideoById(parsed.id);
                }
            }
        });

        // Main Player Init
        function initMainPlayer() {
            player = new YT.Player('yt-player', {
                videoId: videoId,
                playerVars: { controls: 0, autoplay: 1, rel: 0 },
                events: { 'onReady': (e) => {
                    e.target.seekTo(startTime);
                    e.target.setVolume(100);
                    updateInterval = setInterval(checkTime, 100);
                }}
            });
        }

        // Auto-Loop & Time Logic
        function checkTime() {
            const current = player.getCurrentTime();
            if (current >= endTime) {
                player.seekTo(startTime); // Loop functionality
            }
            document.getElementById('progress-slider').value = current - startTime;
        }

        // Volume Control
        document.getElementById('volume-slider').addEventListener('input', (e) => {
            player.setVolume(e.target.value);
        });

        // Generate Button
        document.getElementById('btn-generate').addEventListener('click', () => {
            const parsed = parseVideoUrl(document.getElementById('yt-url').value);
            const data = { t: parsed.type, v: parsed.id, s: document.getElementById('start-time').value, e: document.getElementById('end-time').value };
            const link = window.location.origin + window.location.pathname + '?lesson=' + btoa(JSON.stringify(data));
            document.getElementById('generated-link').value = link;
            document.getElementById('result-box').classList.remove('hidden');
        });

        // Handle URL Params
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('lesson')) {
            const data = JSON.parse(atob(urlParams.get('lesson')));
            videoId = data.v; startTime = parseInt(data.s); endTime = parseInt(data.e);
            document.getElementById('player-view').classList.remove('hidden');
            document.getElementById('generator-view').classList.add('hidden');
        }
    </script>
</body>
</html>
